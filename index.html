<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="stylesheet.css" rel="stylesheet" />
    <title>Login Page</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div>
          <img src="image/laundryImage.png" class="image" alt="laundryImage"/>
        </div>
      </div>
      <div class="right">
        <div class="">
          <div class="text">
            <h1>Hello Again!</h1>
            <p>Welcome back! we missed you !</p>
          </div>

          <form action="login">
            <label>Email</label><br />
            <input type="text" placeholder="Emailid@site.com" class="email" name="email"/>
            <br />

            <label>Password</label><br />
            <input type="password" placeholder="Password" class="password" name="password"/>
            <p>Forgot Password</p>

            <button class="btn">Login</button>

            <p class="link-text">Not a member?<a href="#">Register Now</a></p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
